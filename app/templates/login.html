<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WGXC Tower — Operator Login</title>
<style>
    :root {
        --bg: #16161e; --panel: #1a1b26; --border: rgba(255,255,255,0.08);
        --dim: #a9b1d6; --muted: #565f89; --green: #9ece6a; --red: #f7768e;
        --purple: #bb9af7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: var(--bg); color: var(--dim);
        font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }
    .card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
        padding: 32px 28px; width: 100%; max-width: 360px; text-align: center;
    }
    .station { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .06em; }
    .sub { font-size: 10px; color: var(--muted); text-transform: uppercase;
           letter-spacing: .12em; margin: 6px 0 24px; }
    .err { color: var(--red); font-size: 11px; margin-bottom: 14px;
           border: 1px solid rgba(247,118,142,0.3); background: rgba(247,118,142,0.08);
           padding: 8px; border-radius: 3px; }
    label { display: block; font-size: 9px; color: var(--muted); text-transform: uppercase;
            letter-spacing: .12em; text-align: left; margin-bottom: 5px; }
    input[type=text], input[type=password] {
        width: 100%; padding: 12px; font-family: inherit; font-size: 14px;
        background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
        color: #fff; margin-bottom: 14px;
    }
    input[type=password] { font-size: 18px; text-align: center; letter-spacing: .4em; }
    input[type=text]:focus, input[type=password]:focus { outline: none; border-color: var(--purple); }
    .go {
        width: 100%; padding: 12px; font-family: inherit; font-size: 12px;
        font-weight: 700; letter-spacing: .12em; border: 1px solid rgba(158,206,106,0.35);
        border-radius: 3px; background: rgba(158,206,106,0.1); color: var(--green);
        cursor: pointer;
    }
    .hint { font-size: 9px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
</style>
</head>
<body>
<form method="POST" class="card">
    <div class="sub">Tower Fallback Control</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label for="user">First Name</label>
    <input type="text" name="user" id="user" autocomplete="username"
           placeholder="e.g. {{ users | random }}" required autofocus>
    <label for="pin">PIN</label>
    <input type="password" name="pin" id="pin" inputmode="numeric" autocomplete="current-password"
           placeholder="••••" required>
    <button type="submit" class="go">SIGN IN</button>
</form>
</body>
</html>
